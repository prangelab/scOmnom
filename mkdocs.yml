site_name: scOmnom
site_description: Read-the-docs style manual for the scOmnom single-cell RNA-seq workflow.
site_url: https://prangelab.org/scOmnom/
repo_name: prangelab/scOmnom
repo_url: https://github.com/prangelab/scOmnom
edit_uri: edit/main/docs/

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - bash
    - python
    - yaml
    - r

nav:
  - Home: index.md
  - Manual:
      - Overview: manual.md
      - Installation: installation.md
      - Usage: usage.md
      - Pipeline Overview: pipeline-overview.md
      - scOmnom AnnData Structure: adata-structure.md
      - Input Modes: input-modes.md
      - Load And Filter: load-and-filter.md
      - Integrate:
          - Overview: integrate.md
          - Supported Methods: integrate/methods.md
          - scANVI Supervision: integrate/scanvi-supervision.md
          - scIB Benchmarking: integrate/benchmarking.md
          - Annotated Refinement: integrate/annotated-run.md
          - Outputs: integrate/outputs.md
          - Cluster Relationship: integrate/cluster-relationship.md
      - Cluster And Annotate:
          - Overview: cluster-and-annotate.md
          - CellTypist Models: cluster-and-annotate/celltypist.md
          - Reproducibility: cluster-and-annotate/reproducibility.md
          - BISC: cluster-and-annotate/bisc.md
          - Cluster Annotation: cluster-and-annotate/cluster-annotation.md
          - Compaction: cluster-and-annotate/compaction.md
          - Decoupler Configuration: cluster-and-annotate/decoupler.md
          - Outputs: cluster-and-annotate/outputs.md
          - Reporting: cluster-and-annotate/reporting.md
      - AnnData Operations:
          - Overview: adata-ops.md
          - Subset: adata-ops/subset.md
          - Annotation Merge: adata-ops/annotation-merge.md
          - Manual Renaming: adata-ops/rename.md
          - Multi-adata Merge: adata-ops/merge.md
      - Markers And DE:
          - Overview: markers-and-de.md
          - Markers: markers-and-de/markers.md
          - Within-cluster DE: markers-and-de/de.md
          - Cell-level vs Pseudobulk: markers-and-de/cell-vs-pseudobulk.md
          - Differential Abundance: markers-and-de/da.md
          - Enrichment: markers-and-de/enrichment.md
          - LIANA CCC: markers-and-de/liana.md
          - NicheNet CCC: markers-and-de/nichenet.md
          - MEBOCOST CCC: markers-and-de/mebocost.md
      - SLURM And HPC: hpc-slurm.md
  - Design Goals: design-goals.md
  - API Reference: api-reference.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - sane_lists
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

strict: true
