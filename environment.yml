name: scOmnom_env

channels:
  # Keep this ordering to make sure PyTorch + CUDA resolve cleanly
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python / tooling
  - python=3.11.14
  - pip
  - setuptools
  - wheel
  - cython
  - pillow>=10.1

  # Numeric stack
  - numpy=2.3.5
  - scipy=1.15.3
  - pandas=2.3.3
  - matplotlib
  - seaborn
  - joblib
  - h5py=3.15.1
  - scikit-learn
  - psutil
  - statsmodels
  - xlsxwriter

  # Scanpy ecosystem
  - scanpy=1.11.5
  - anndata=0.12.7
  - zarr=3.1.5
  - numcodecs=0.16.5
  - zstandard
  - igraph
  - python-igraph
  - leidenalg
  - scrublet
  - kneed
  - typer
  - pydantic
  - bbknn
  - gseapy

  # PyTorch / Lightning
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-lightning

  # GPU acceleration:
  # On macOS: Metal/MPS enabled automatically. Comment out or remove the next line (pytorch-cuda)
  # On Linux (NVIDIA GPU) keep the next line to install pytorch-cuda. (adjust version as needed)
  #- pytorch-cuda=12.4

  # Testing
  - pytest

  # These packages seem to install more stable from pip
  - pip:
      - scvi-tools
      - scanorama
      - harmonypy
      - scib-metrics
      - celltypist
      - decoupler
      - umap-learn
      - requests
      - types-pytz
      - pydeseq2
      - pertpy
      - pybiomart
